<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Coaching Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root{--navy:#0f2744;--blue:#1a5fb4;--blue-mid:#2d7dd2;--blue-light:#e8f0fb;--accent:#f5a623;--red:#c0392b;--red-light:#fdf0ee;--green:#1a7a4a;--green-light:#eaf7f0;--gray-1:#f7f9fc;--gray-2:#eef1f6;--gray-3:#d4dae4;--gray-4:#8a95a3;--gray-5:#4a5568;--white:#fff;--text:#1a202c;--radius:10px;--shadow:0 2px 12px rgba(15,39,68,.10);--shadow-lg:0 8px 32px rgba(15,39,68,.15)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--gray-1);color:var(--text);min-height:100vh}
  .header{background:var(--navy);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(0,0,0,.2)}
  .header-left{display:flex;align-items:center;gap:14px}
  .header-icon{width:42px;height:42px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .header h1{color:#fff;font-size:20px;font-weight:700}
  .header p{color:#7fa8d4;font-size:12px;margin-top:2px}
  .header-badge{background:var(--accent);color:var(--navy);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}
  .tabs{background:#fff;border-bottom:2px solid var(--gray-2);display:flex;padding:0 32px;gap:4px}
  .tab{padding:14px 22px;font-size:13px;font-weight:600;color:var(--gray-4);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
  .tab:hover{color:var(--blue)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
  .main{padding:28px 32px;max-width:1400px;margin:0 auto}
  .section{display:none}.section.active{display:block}
  /* search */
  .search-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 28px;margin-bottom:20px}
  .search-label{font-size:11px;font-weight:700;color:var(--gray-4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
  .search-row{display:flex;gap:12px;align-items:center}
  .search-input{flex:1;padding:13px 18px;border:2px solid var(--gray-3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;outline:none;transition:border .2s,box-shadow .2s;background:var(--gray-1)}
  .search-input:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(45,125,210,.12);background:#fff}
  .search-input::placeholder{color:var(--gray-3)}
  .search-clear{padding:13px 20px;background:var(--gray-2);color:var(--gray-5);border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600}
  .search-meta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .badge-green{background:var(--green-light);color:var(--green)}.badge-red{background:var(--red-light);color:var(--red)}.badge-gray{background:var(--gray-2);color:var(--gray-5)}.badge-blue{background:var(--blue-light);color:var(--blue)}
  /* contact card shown in search */
  .contact-card{background:var(--blue-light);border-radius:8px;padding:12px 16px;margin-top:10px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;font-size:13px}
  .contact-card strong{color:var(--navy);font-size:14px;font-weight:700;flex:1 1 100%}
  .contact-item{display:flex;align-items:center;gap:6px;color:var(--blue)}
  /* table */
  .table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-2)}
  .table-title{font-size:14px;font-weight:700;color:var(--navy)}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--navy);color:#fff;padding:11px 14px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;text-align:left;white-space:nowrap}
  thead th:first-child{width:50px;text-align:center}
  tbody tr{border-bottom:1px solid var(--gray-2);transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--blue-light)}
  tbody td{padding:11px 14px;font-size:13px}
  tbody td:first-child{text-align:center;color:var(--gray-4);font-family:'DM Mono',monospace;font-size:11px}
  .no-results{text-align:center;padding:60px 20px;color:var(--gray-4);font-size:14px}
  .no-results .icon{font-size:40px;margin-bottom:10px}
  .highlight{background:rgba(245,166,35,.3);border-radius:3px;padding:1px 3px}
  .prob{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700}
  .pCDF{background:#dbeafe;color:#1d4ed8}.pDSB{background:#fce7f3;color:#9d174d}.pCDFDSB{background:#ede9fe;color:#5b21b6}
  .pNRP{background:#fef3c7;color:#92400e}.pNRD{background:#fee2e2;color:#991b1b}.pDNFI{background:#d1fae5;color:#065f46}
  .pNRPDNFI{background:#ecfdf5;color:#065f46}.pDWA{background:#fff7ed;color:#c2410c}.pOther{background:#f3f4f6;color:#374151}
  .action-badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;background:var(--green-light);color:var(--green)}
  .status-active{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#d1fae5;color:#065f46}
  .status-inactive{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#fee2e2;color:#991b1b}
  /* form */
  .form-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;margin-bottom:20px}
  .form-card h2{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
  .form-group{display:flex;flex-direction:column;gap:6px}.form-group.full{grid-column:1/-1}
  label{font-size:11px;font-weight:700;color:var(--gray-4);letter-spacing:.5px;text-transform:uppercase}
  input[type=text],input[type=date],input[type=time],select,textarea{padding:10px 13px;border:2px solid var(--gray-3);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--gray-1);outline:none;transition:all .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(45,125,210,.1);background:#fff}
  textarea{resize:vertical;min-height:70px}
  .btn{padding:11px 24px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
  .btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--navy)}
  .btn-danger{background:var(--red-light);color:var(--red)}.btn-sm{padding:6px 12px;font-size:11px}
  .form-actions{display:flex;gap:10px;margin-top:20px}
  /* autocomplete */
  .autocomplete-wrap{position:relative}
  .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--blue-mid);border-top:none;border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:var(--shadow-lg)}
  .autocomplete-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--gray-2);display:flex;justify-content:space-between;align-items:center}
  .autocomplete-item:last-child{border-bottom:none}
  .autocomplete-item:hover,.autocomplete-item.selected{background:var(--blue-light)}
  .autocomplete-item small{font-size:11px;color:var(--gray-4)}
  /* info preview below name field */
  .assoc-preview{background:var(--green-light);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--green);margin-top:4px;display:none}
  /* export bar */
  .export-bar{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .export-bar p{font-size:13px;color:var(--gray-5)}
  /* summary */
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:20px}
  .stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;border-left:4px solid var(--blue)}
  .stat-card .num{font-size:32px;font-weight:700;color:var(--navy);line-height:1}
  .stat-card .lbl{font-size:11px;font-weight:700;color:var(--gray-4);letter-spacing:.5px;text-transform:uppercase;margin-top:6px}
  /* toast */
  .toast{position:fixed;bottom:28px;right:28px;background:var(--navy);color:#fff;padding:13px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:999;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
  .toast.show{transform:translateY(0);opacity:1}
  /* modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:14px;padding:28px;width:90%;max-width:680px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
  .modal h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  /* associates tab */
  .assoc-search-row{display:flex;gap:12px;margin-bottom:16px}
  .assoc-search-input{flex:1;padding:11px 16px;border:2px solid var(--gray-3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;background:var(--gray-1)}
  .assoc-search-input:focus{border-color:var(--blue-mid);background:#fff}
  @media(max-width:768px){.main{padding:16px}.header{padding:14px 16px}.tabs{padding:0 16px;overflow-x:auto}.form-grid{grid-template-columns:1fr 1fr}}

</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-icon">🚛</div>
    <div><h1>Driver Coaching Tracker</h1><p>177 associates loaded · Search, log and track incidents</p></div>
  </div>
  <span class="header-badge" id="totalBadge">0 Records</span>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('search')" id="tab-search">🔍 Search</div>
  <div class="tab" onclick="showTab('add')"     id="tab-add">➕ Add Record</div>
  <div class="tab" onclick="showTab('all')"     id="tab-all">📋 All Records</div>
  <div class="tab" onclick="showTab('summary')" id="tab-summary">📊 Summary</div>
  <div class="tab" onclick="showTab('associates')" id="tab-associates">👥 Associates</div>
</div>
<div class="main">

  <!-- SEARCH -->
  <div class="section active" id="section-search">
    <div class="search-box">
      <div class="search-label">Search by driver name</div>
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="Type a name..." oninput="doSearch()" autocomplete="off">
        <button class="search-clear" onclick="clearSearch()">✕ Clear</button>
      </div>
      <div class="search-meta" id="searchMeta"></div>
      <div id="contactCard"></div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><span class="table-title" id="searchResultTitle">Results</span></div>
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- ADD -->
  <div class="section" id="section-add">
    <div class="form-card">
      <h2>➕ Add New Record</h2>
      <div class="form-grid">
        <div class="form-group"><label>Route</label><input type="text" id="f-route" value="Route"></div>
        <div class="form-group">
          <label>Driver Name *</label>
          <div class="autocomplete-wrap">
            <input type="text" id="f-name" placeholder="Type name..." autocomplete="off" oninput="acInput()" onkeydown="acKey(event)">
            <div class="autocomplete-list" id="acList" style="display:none"></div>
          </div>
          <div class="assoc-preview" id="assocPreview"></div>
        </div>
        <div class="form-group"><label>Time</label><input type="time" id="f-time"></div>
        <div class="form-group"><label>Date *</label><input type="date" id="f-date"></div>
        <div class="form-group"><label>ID / Badge</label><input type="text" id="f-badge" placeholder="Badge #"></div>
        <div class="form-group"><label>Problems</label>
          <select id="f-problem">
            <option value="">Select...</option>
            <option>CDF</option><option>DSB</option><option>CDF and DSB</option>
            <option>NRP</option><option>NRD</option><option>DNFI</option>
            <option>NRP and DNFI</option><option>DWA</option>
            <option>DA Mishandled Package</option>
            <option>DA was Unprofessional</option>
            <option>DA did not follow delivery instructions</option>
            <option>Delivered to Wrong Address</option>
            <option>Never Received Delivery</option>
            <option>Received Wrong Item</option>
            <option>Speeding</option><option>Safety</option><option>Attendance</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Action</label>
          <select id="f-action">
            <option value="">Select...</option>
            <option>Coaching</option><option>Warning</option><option>Write-up</option>
            <option>Termination</option><option>No Action</option>
          </select>
        </div>
        <div class="form-group full"><label>Description</label><textarea id="f-desc" placeholder="Describe the incident..."></textarea></div>
        <div class="form-group full"><label>Follow-up</label><input type="text" id="f-followup" placeholder="Follow-up notes"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addRecord()">💾 Save Record</button>
        <button class="btn" style="background:var(--gray-2);color:var(--gray-5)" onclick="resetForm()">Reset</button>
      </div>
    </div>
  </div>

  <!-- ALL -->
  <div class="section" id="section-all">
    <div class="export-bar">
      <p>All records — <strong id="allCount">0</strong> total</p>
      <button class="btn btn-primary btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="table-wrap"><div id="allResults"></div></div>
  </div>

  <!-- SUMMARY -->
  <div class="section" id="section-summary">
    <div class="summary-grid" id="statsCards"></div>
    <div class="table-wrap">
      <div class="table-header"><span class="table-title">Incidents by Driver</span></div>
      <div id="driverSummary"></div>
    </div>
  </div>

  <!-- ASSOCIATES -->
  <div class="section" id="section-associates">
    <div class="form-card" style="padding:20px 24px;margin-bottom:20px">
      <div class="assoc-search-row">
        <input class="assoc-search-input" id="assocSearchInput" type="text" placeholder="Search associate by name, email or phone..." oninput="renderAssociates()">
        <div style="display:flex;gap:8px;align-items:center">
          <label style="font-size:12px;color:var(--gray-4);white-space:nowrap"><input type="checkbox" id="activeOnly" onchange="renderAssociates()" checked> Active only</label>
        </div>
      </div>
      <span id="assocCount" class="badge badge-blue"></span>
    </div>
    <div class="table-wrap"><div id="assocTable"></div></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>✏️ Edit Record</h3>
    <div class="form-grid">
      <div class="form-group"><label>Route</label><input type="text" id="e-route"></div>
      <div class="form-group"><label>Driver Name</label><input type="text" id="e-name"></div>
      <div class="form-group"><label>Time</label><input type="time" id="e-time"></div>
      <div class="form-group"><label>Date</label><input type="date" id="e-date"></div>
      <div class="form-group"><label>ID/Badge</label><input type="text" id="e-badge"></div>
      <div class="form-group"><label>Problems</label>
        <select id="e-problem"><option value="">Select...</option><option>CDF</option><option>DSB</option><option>CDF and DSB</option><option>NRP</option><option>NRD</option><option>DNFI</option><option>NRP and DNFI</option><option>DWA</option><option>DA Mishandled Package</option><option>DA was Unprofessional</option><option>DA did not follow delivery instructions</option><option>Delivered to Wrong Address</option><option>Never Received Delivery</option><option>Received Wrong Item</option><option>Speeding</option><option>Safety</option><option>Attendance</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Action</label>
        <select id="e-action"><option value="">Select...</option><option>Coaching</option><option>Warning</option><option>Write-up</option><option>Termination</option><option>No Action</option></select>
      </div>
      <div class="form-group full"><label>Description</label><textarea id="e-desc"></textarea></div>
      <div class="form-group full"><label>Follow-up</label><input type="text" id="e-followup"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveEdit()">💾 Save Changes</button>
      <button class="btn" style="background:var(--gray-2);color:var(--gray-5)" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

function showTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='all') renderAll();
  if(t==='summary') renderSummary();
  if(t==='search') doSearch();
  if(t==='associates') renderAssociates();
}

function probBadge(p){
  if(!p) return '';
  const m={'CDF':'pCDF','DSB':'pDSB','CDF and DSB':'pCDFDSB','NRP':'pNRP','NRD':'pNRD','DNFI':'pDNFI','DNFDI':'pDNFI','NRP and DNFI':'pNRPDNFI','DWA':'pDWA'};
  return `<span class="prob ${m[p]||'pOther'}">${p}</span>`;
}
function actionBadge(a){return a?`<span class="action-badge">${a}</span>`:'';}
function hl(t,q){if(!q||!t)return t||'';return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="highlight">$1</span>');}
function fmtPhone(p){if(!p||p.length<10)return p;const d=p.replace(/\D/g,'');return d.length===10?`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`:p;}

function getAssoc(name){
  if(!name) return null;
  const nl=name.toLowerCase();
  return ASSOCIATES.find(a=>a.name.toLowerCase()===nl||a.name.toLowerCase().includes(nl)||nl.includes(a.name.toLowerCase().split(' ')[0]&&a.name.toLowerCase()));
}
function findAssoc(name){
  const nl=name.toLowerCase();
  return ASSOCIATES.find(a=>a.name.toLowerCase()===nl);
}

function renderTable(data,el,q='',editable=false){
  if(!data.length){el.innerHTML=`<div class="no-results"><div class="icon">🔍</div>No records found${q?' for "'+q+'"':''}</div>`;return;}
  let h=`<table><thead><tr><th>#</th><th>Route</th><th>Driver Name</th><th>Time</th><th>Date</th><th>ID/Badge</th><th>Problems</th><th>Description</th><th>Action</th><th>Follow-up</th>${editable?'<th>Edit</th>':''}</tr></thead><tbody>`;
  data.forEach((r,i)=>{
    const a=findAssoc(r.name);
    const contact=a?`<div style="font-size:11px;color:var(--gray-4);margin-top:2px">📞 ${fmtPhone(a.phone)} · ✉️ ${a.email}</div>`:'';
    h+=`<tr><td>${i+1}</td><td>${hl(r.route,q)}</td><td><strong>${hl(r.name,q)}</strong>${contact}</td><td>${r.time||'—'}</td><td>${r.date||'—'}</td><td style="font-family:'DM Mono',monospace;font-size:11px">${r.badge||'—'}</td><td>${probBadge(r.problem)}</td><td style="max-width:220px;font-size:12px">${hl(r.desc,q)}</td><td>${actionBadge(r.action)}</td><td style="font-size:12px;color:var(--gray-4)">${r.followup||'—'}</td>${editable?`<td style="white-space:nowrap"><button class="btn btn-sm" style="background:var(--blue-light);color:var(--blue);margin-right:4px" onclick="openEdit(${r.id})">✏️</button><button class="btn btn-danger btn-sm" onclick="delRec(${r.id})">✕</button></td>`:''}</tr>`;
  });
  h+='</tbody></table>';el.innerHTML=h;
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  const meta=document.getElementById('searchMeta');
  const title=document.getElementById('searchResultTitle');
  const el=document.getElementById('searchResults');
  const card=document.getElementById('contactCard');
  if(!q){
    meta.innerHTML='<span class="badge badge-gray">Type a name to search</span>';
    title.textContent='Results';card.innerHTML='';
    el.innerHTML='<div class="no-results"><div class="icon">🔍</div>Start typing a driver name above</div>';return;
  }
  const res=records.filter(r=>r.name.toLowerCase().includes(q.toLowerCase()));
  // show contact card if exact-ish match
  const assoc=ASSOCIATES.find(a=>a.name.toLowerCase().includes(q.toLowerCase()));
  if(assoc){
    const st=assoc.status==='ACTIVE'?'<span class="status-active">ACTIVE</span>':'<span class="status-inactive">INACTIVE</span>';
    card.innerHTML=`<div class="contact-card"><strong>👤 ${assoc.name} ${st}</strong><span class="contact-item">📞 ${fmtPhone(assoc.phone)}</span><span class="contact-item">✉️ ${assoc.email}</span></div>`;
  } else {card.innerHTML='';}
  meta.innerHTML=`<span class="badge ${res.length?'badge-green':'badge-red'}">${res.length} record(s) found for "${q}"</span>`;
  title.textContent=`Results for "${q}" (${res.length})`;
  renderTable(res,el,q,false);
}
function clearSearch(){document.getElementById('searchInput').value='';doSearch();}

function renderAll(){
  document.getElementById('allCount').textContent=records.length;
  renderTable([...records].reverse(),document.getElementById('allResults'),'',true);
}

function delRec(id){
  if(!confirm('Delete this record?'))return;
  records=records.filter(r=>r.id!==id);save();updateBadge();renderAll();toast('Record deleted');
}

function openEdit(id){
  const r=records.find(x=>x.id===id);if(!r)return;editingId=id;
  document.getElementById('e-route').value=r.route||'';
  document.getElementById('e-name').value=r.name||'';
  document.getElementById('e-time').value=r.time||'';
  let dv='';if(r.date){const p=r.date.split('/');if(p.length===3)dv=`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;}
  document.getElementById('e-date').value=dv;
  document.getElementById('e-badge').value=r.badge||'';
  document.getElementById('e-problem').value=r.problem||'';
  document.getElementById('e-action').value=r.action||'';
  document.getElementById('e-desc').value=r.desc||'';
  document.getElementById('e-followup').value=r.followup||'';
  document.getElementById('editModal').classList.add('open');
}
function closeModal(){document.getElementById('editModal').classList.remove('open');editingId=null;}
function saveEdit(){
  const r=records.find(x=>x.id===editingId);if(!r)return;
  const dv=document.getElementById('e-date').value;
  let ds='';if(dv){const p=dv.split('-');ds=`${parseInt(p[1])}/${parseInt(p[2])}/${p[0]}`;}
  r.route=document.getElementById('e-route').value.trim();r.name=document.getElementById('e-name').value.trim();
  r.time=document.getElementById('e-time').value;r.date=ds;r.badge=document.getElementById('e-badge').value.trim();
  r.problem=document.getElementById('e-problem').value;r.action=document.getElementById('e-action').value;
  r.desc=document.getElementById('e-desc').value.trim();r.followup=document.getElementById('e-followup').value.trim();
  save();updateBadge();closeModal();renderAll();toast('✅ Record updated');
}
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// AUTOCOMPLETE
function acInput(){
  const val=document.getElementById('f-name').value.trim();
  const list=document.getElementById('acList');
  const preview=document.getElementById('assocPreview');
  preview.style.display='none';acSelected=-1;
  if(val.length<2){list.style.display='none';return;}
  const matches=ASSOCIATES.filter(a=>a.name.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML=matches.map((a,i)=>`<div class="autocomplete-item" data-i="${i}" data-name="${a.name}" onmousedown="acSelect('${a.name.replace(/'/g,"\\'")}')"><span>${a.name} <span class="${a.status==='ACTIVE'?'status-active':'status-inactive'}" style="margin-left:6px">${a.status}</span></span><small>${fmtPhone(a.phone)}</small></div>`).join('');
  list.style.display='block';
}
function acSelect(name){
  document.getElementById('f-name').value=name;
  document.getElementById('acList').style.display='none';
  const a=ASSOCIATES.find(x=>x.name===name);
  if(a){
    const p=document.getElementById('assocPreview');
    p.innerHTML=`📞 ${fmtPhone(a.phone)} &nbsp;·&nbsp; ✉️ ${a.email}`;
    p.style.display='block';
  }
}
function acKey(e){
  const list=document.getElementById('acList');
  const items=list.querySelectorAll('.autocomplete-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acSelected=Math.min(acSelected+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('selected',i===acSelected));}
  else if(e.key==='ArrowUp'){e.preventDefault();acSelected=Math.max(acSelected-1,0);items.forEach((el,i)=>el.classList.toggle('selected',i===acSelected));}
  else if(e.key==='Enter'&&acSelected>=0){e.preventDefault();acSelect(items[acSelected].dataset.name);}
  else if(e.key==='Escape'){list.style.display='none';}
}
document.addEventListener('click',e=>{if(!e.target.closest('.autocomplete-wrap'))document.getElementById('acList').style.display='none';});

function addRecord(){
  const name=document.getElementById('f-name').value.trim();
  const date=document.getElementById('f-date').value;
  if(!name){alert('Driver name is required');return;}
  if(!date){alert('Date is required');return;}
  const p=date.split('-');
  records.push({id:nextId++,route:document.getElementById('f-route').value.trim(),name,
    time:document.getElementById('f-time').value,date:`${parseInt(p[1])}/${parseInt(p[2])}/${p[0]}`,
    badge:document.getElementById('f-badge').value.trim(),problem:document.getElementById('f-problem').value,
    desc:document.getElementById('f-desc').value.trim(),action:document.getElementById('f-action').value,
    followup:document.getElementById('f-followup').value.trim()});
  save();updateBadge();resetForm();
  toast(`✅ Saved — ${name}`);showTab('search');
  document.getElementById('searchInput').value=name;doSearch();
}
function resetForm(){
  ['f-name','f-time','f-badge','f-desc','f-followup'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-route').value='Route';
  document.getElementById('f-problem').value='';document.getElementById('f-action').value='';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('acList').style.display='none';
  document.getElementById('assocPreview').style.display='none';
}

function renderSummary(){
  const total=records.length,drivers=[...new Set(records.map(r=>r.name))].length;
  const cdf=records.filter(r=>r.problem&&r.problem.includes('CDF')).length;
  const dsb=records.filter(r=>r.problem&&r.problem.includes('DSB')).length;
  document.getElementById('statsCards').innerHTML=`
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Records</div></div>
    <div class="stat-card" style="border-color:#7c3aed"><div class="num">${drivers}</div><div class="lbl">Unique Drivers</div></div>
    <div class="stat-card" style="border-color:#1d4ed8"><div class="num">${cdf}</div><div class="lbl">CDF Incidents</div></div>
    <div class="stat-card" style="border-color:#9d174d"><div class="num">${dsb}</div><div class="lbl">DSB Incidents</div></div>`;
  const dm={};
  records.forEach(r=>{if(!dm[r.name])dm[r.name]={name:r.name,total:0,dates:[],lastAction:''};dm[r.name].total++;dm[r.name].dates.push(r.date);dm[r.name].lastAction=r.action;});
  const rows=Object.values(dm).sort((a,b)=>b.total-a.total);
  if(!rows.length){document.getElementById('driverSummary').innerHTML='<div class="no-results"><div class="icon">📊</div>No data yet</div>';return;}
  let h=`<table><thead><tr><th>Driver Name</th><th>Phone</th><th>Email</th><th>Total</th><th>Dates</th><th>Last Action</th></tr></thead><tbody>`;
  rows.forEach((d,i)=>{
    const a=findAssoc(d.name);
    h+=`<tr style="${i%2?'background:var(--gray-1)':''}"><td><strong>${d.name}</strong></td><td style="font-size:12px">${a?fmtPhone(a.phone):'—'}</td><td style="font-size:11px;color:var(--gray-4)">${a?a.email:'—'}</td><td><span class="badge badge-blue">${d.total}</span></td><td style="font-size:12px;color:var(--gray-4)">${[...new Set(d.dates)].join(' · ')}</td><td>${actionBadge(d.lastAction)}</td></tr>`;
  });
  h+='</tbody></table>';document.getElementById('driverSummary').innerHTML=h;
}

function renderAssociates(){
  const q=(document.getElementById('assocSearchInput').value||'').toLowerCase();
  const activeOnly=document.getElementById('activeOnly').checked;
  let list=ASSOCIATES.filter(a=>{
    if(activeOnly&&a.status!=='ACTIVE')return false;
    if(!q)return true;
    return a.name.toLowerCase().includes(q)||a.email.toLowerCase().includes(q)||a.phone.includes(q);
  });
  document.getElementById('assocCount').textContent=`${list.length} associate(s)`;
  if(!list.length){document.getElementById('assocTable').innerHTML='<div class="no-results"><div class="icon">👥</div>No associates found</div>';return;}
  let h=`<table><thead><tr><th>#</th><th>Full Name</th><th>Phone</th><th>Email</th><th>Status</th><th>Incidents</th></tr></thead><tbody>`;
  list.forEach((a,i)=>{
    const inc=records.filter(r=>r.name.toLowerCase()===a.name.toLowerCase()).length;
    const st=a.status==='ACTIVE'?'<span class="status-active">ACTIVE</span>':'<span class="status-inactive">INACTIVE</span>';
    h+=`<tr style="${i%2?'background:var(--gray-1)':''}"><td>${i+1}</td><td><strong>${a.name}</strong></td><td style="font-family:'DM Mono',monospace;font-size:12px">${fmtPhone(a.phone)}</td><td style="font-size:12px;color:var(--gray-4)">${a.email}</td><td>${st}</td><td>${inc?`<span class="badge badge-blue">${inc}</span>`:'<span style="color:var(--gray-3)">—</span>'}</td></tr>`;
  });
  h+='</tbody></table>';document.getElementById('assocTable').innerHTML=h;
}

function exportCSV(){
  const h=['#','Route','Driver Name','Phone','Email','Time','Date','ID/Badge','Problems','Description','Action','Follow-up'];
  const csv=[h,...records.map((r,i)=>{const a=findAssoc(r.name);return[i+1,r.route,r.name,a?a.phone:'',a?a.email:'',r.time,r.date,r.badge,r.problem,r.desc,r.action,r.followup];})].map(r=>r.map(v=>'"'+(v||'').toString().replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='driver_coaching_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('📥 CSV exported');
}

function updateBadge(){document.getElementById('totalBadge').textContent=records.length+' Records';}
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2800);}

load();updateBadge();doSearch();
document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
</script>
